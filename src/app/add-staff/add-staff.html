<!-- App body starts -->
<div class="app-body">
  <!-- Row starts -->
  <div class="row gx-4">
    <div class="col-sm-12">
      <div class="card">
        <div class="card-header">
          <h5 class="card-title">Add Staff Details</h5>
        </div>
        <div class="card-body">
          <!-- Row starts -->
          <div class="row gx-4">
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a1"
                  >Staff Code <span class="text-danger">*</span></label
                >
                <input type="text" class="form-control" id="Text1" placeholder="Enter Staff Code" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a1"
                  >Full Name <span class="text-danger">*</span></label
                >
                <input type="text" class="form-control" id="a1" placeholder="Enter Full Name" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a2">Email <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="a2" placeholder="Enter Email" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a3"
                  >Mobile Number<span class="text-danger">*</span></label
                >
                <input
                  type="email"
                  class="form-control"
                  id="a3"
                  placeholder="Enter Mobile Number"
                />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a3">Age<span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="Email1" placeholder="Enter Age" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a4"
                  >Date of Birth <span class="text-danger">*</span></label
                >
                <input type="date" class="form-control" id="a4" placeholder="Enter DOB" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a5">Joining Date</label>
                <input type="date" class="form-control" id="Date1" placeholder="Enter DOB" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a5">Left Date</label>
                <input type="date" class="form-control" id="Date3" placeholder="Enter DOB" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a6">Designation</label>
                <select class="form-select" id="a6">
                  <option value="0">Select</option>
                </select>
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a5">Address</label>
                <textarea
                  type="remarks"
                  class="form-control"
                  id="remarks"
                  placeholder="Enter Address"
                  rows="2"
                  cols="60"
                ></textarea>
              </div>
            </div>
            <div class="col-sm-12">
              <div class="d-flex gap-2 justify-content-end">
                <button type="button" class="btn btn-outline-secondary">Cancel</button>
                <button type="button" class="btn btn-primary">Save</button>
              </div>
            </div>
          </div>
          <!-- Row ends -->
        </div>
      </div>
    </div>
  </div>
  <!-- Row ends -->
</div>
<!-- App body ends -->
