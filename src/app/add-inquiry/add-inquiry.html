<!-- App body starts -->
<div class="app-body">
  <!-- Row starts -->
  <div class="row gx-4">
    <div class="col-sm-12">
      <div class="card">
        <div class="card-header">
          <h5 class="card-title">Add Inquiry Details</h5>
        </div>
        <div class="card-body">
          <!-- Row starts -->
          <div class="row gx-4">
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a1"
                  >Full Name <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="fullName"
                  name="fullName"
                  [(ngModel)]="inquiryDetails.fullName"
                  placeholder="Enter Full Name"
                />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a2">Email <span class="text-danger">*</span></label>
                <input
                  type="text"
                  class="form-control"
                  id="email"
                  name="email"
                  [(ngModel)]="inquiryDetails.email"
                  placeholder="Enter Email"
                />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a3"
                  >Mobile Number<span class="text-danger">*</span></label
                >
                <input
                  type="email"
                  class="form-control"
                  id="mobileNumber"
                  name="mobileNumber"
                  [(ngModel)]="inquiryDetails.mobileNumber"
                  placeholder="Enter Mobile Number"
                />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="selectGender1"
                  >Gender <span class="text-danger">*</span></label
                >
                <div class="m-0">
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="selectGenderOptions"
                      id="gender"
                      [(ngModel)]="inquiryDetails.gender"
                      value="Male"
                    />
                    <label class="form-check-label" for="selectGender1">Male</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="selectGenderOptions"
                      id="selectGender2"
                      [(ngModel)]="inquiryDetails.gender"
                      value="Female"
                    />
                    <label class="form-check-label" for="selectGender2">Female</label>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a4"
                  >Date of Birth <span class="text-danger">*</span></label
                >
                <input
                  type="date"
                  class="form-control"
                  id="dateOfBirth"
                  name="dateOfBirth"
                  [(ngModel)]="inquiryDetails.dateOfBirth"
                  placeholder="Enter DOB"
                />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a5">Inquiry Date</label>
                <input
                  type="date"
                  class="form-control"
                  id="inquiryDate"
                  name="inquiryDate"
                  [(ngModel)]="inquiryDetails.inquiryDate"
                  placeholder="Enter DOB"
                />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a6">Occupation</label>
                <select
                  class="form-select"
                  id="occupation"
                  name="occupation"
                  [(ngModel)]="inquiryDetails.occupation"
                >
                  <option value="">Select</option>
                  @for (singleOccupation of occupationList; track $index) {
                    <option [value]="singleOccupation.key">{{ singleOccupation.key }}</option>
                  } @empty {
                    <option value="">No occupations available</option>
                  }
                </select>
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a6">Package Type</label>
                <select
                  class="form-select"
                  id="packageType"
                  name="packageType"
                  [(ngModel)]="inquiryDetails.packageType"
                >
                  @for (
                    singlePackage of sharedService.masterPackageDetailsList();
                    track singlePackage._id
                  ) {
                    <option [value]="singlePackage._id" [id]="singlePackage._id">
                      {{ singlePackage.packageName }}
                    </option>
                  } @empty {
                    <option value="0">No packages Available</option>
                  }
                </select>
              </div>
            </div>

            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a5">Follow-up Date</label>
                <input
                  type="date"
                  class="form-control"
                  id="followUpDate"
                  name="followUpDate"
                  [(ngModel)]="inquiryDetails.followUpDate"
                  placeholder="Enter Follow Up Date"
                />
              </div>
            </div>

            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a5">Remarks</label>
                <input
                  type="remarks"
                  class="form-control"
                  id="remarks"
                  name="remarks"
                  [(ngModel)]="inquiryDetails.remarks"
                  placeholder="Enter Remarks"
                />
              </div>
            </div>
            <div class="col-sm-12">
              <div class="d-flex gap-2 justify-content-end">
                <button type="button" class="btn btn-outline-secondary">Cancel</button>
                <button type="button" class="btn btn-primary" (click)="saveInquiryDetails()">
                  Save
                </button>
              </div>
            </div>
          </div>
          <!-- Row ends -->
        </div>
      </div>
    </div>
  </div>
  <!-- Row ends -->
</div>
<!-- App body ends -->
