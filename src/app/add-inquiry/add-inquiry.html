<!-- App body starts -->
<div class="app-body">
  <!-- Row starts -->
  <div class="row gx-4">
    <div class="col-sm-12">
      <div class="card">
        <div class="card-header">
          <h5 class="card-title">Add Inquiry Details</h5>
        </div>
        <div class="card-body">
          <!-- Row starts -->
          <div class="row gx-4">
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a1"
                  >Full Name <span class="text-danger">*</span></label
                >
                <input type="text" class="form-control" id="a1" placeholder="Enter Full Name" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a2">Email <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="a2" placeholder="Enter Email" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a3"
                  >Mobile Number<span class="text-danger">*</span></label
                >
                <input
                  type="email"
                  class="form-control"
                  id="a3"
                  placeholder="Enter Mobile Number"
                />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="selectGender1"
                  >Gender <span class="text-danger">*</span></label
                >
                <div class="m-0">
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="selectGenderOptions"
                      id="selectGender1"
                      value="male"
                    />
                    <label class="form-check-label" for="selectGender1">Male</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="selectGenderOptions"
                      id="selectGender2"
                      value="female"
                    />
                    <label class="form-check-label" for="selectGender2">Female</label>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a4"
                  >Date of Birth <span class="text-danger">*</span></label
                >
                <input type="date" class="form-control" id="a4" placeholder="Enter DOB" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a5">Inquiry Date</label>
                <input type="date" class="form-control" id="Date1" placeholder="Enter DOB" />
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a6">Occupation</label>
                <select class="form-select" id="a6">
                  <option value="0">Select</option>
                  <option value="1">Developer</option>
                  <option value="2">Designer</option>
                  <option value="3">Teacher</option>
                  <option value="4">Doctor</option>
                  <option value="5">Business</option>
                </select>
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a6">Package Type</label>
                <select class="form-select" id="Select1">
                  <option value="0">Select</option>
                </select>
              </div>
            </div>

            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a5">Follow-up Date</label>
                <input type="date" class="form-control" id="Date2" placeholder="Enter DOB" />
              </div>
            </div>

            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a5">Remarks</label>
                <input
                  type="remarks"
                  class="form-control"
                  id="remarks"
                  placeholder="Enter Remarks"
                />
              </div>
            </div>
            <div class="col-sm-12">
              <div class="d-flex gap-2 justify-content-end">
                <button type="button" class="btn btn-outline-secondary">Cancel</button>
                <button type="button" class="btn btn-primary">Save</button>
              </div>
            </div>
          </div>
          <!-- Row ends -->
        </div>
      </div>
    </div>
  </div>
  <!-- Row ends -->
</div>
<!-- App body ends -->
