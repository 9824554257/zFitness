<!-- App body starts -->
<div class="app-body">
  <!-- Row starts -->
  <div class="row gx-4">
    <div class="col-sm-12">
      <div class="card">
        <div class="card-header">
          <h5 class="card-title">Misc Master</h5>
        </div>
        <div class="card-body">
          <!-- Row starts -->
          <div class="row gx-4">
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a6"> Type</label>
                <select
                  class="form-select"
                  id="type"
                  name="type"
                  [(ngModel)]="type"
                  (change)="getMiscDataFromType()"
                >
                  <option value="Select">Select</option>
                  <option value="Occupation">Occupation</option>
                  <option value="Marital Status">Marital Status</option>
                  <option value="Shift type">Shift type</option>
                </select>
              </div>
            </div>
            <div class="col-xxl-3 col-lg-4 col-sm-6">
              <div class="mb-3">
                <label class="form-label" for="a1"> Name <span class="text-danger">*</span></label>
                <input
                  type="text"
                  class="form-control"
                  id="textValue"
                  name="textValue"
                  [(ngModel)]="textValue"
                  placeholder="Enter Name"
                />
              </div>
            </div>
            <div class="col-sm-12">
              <div class="d-flex gap-2 justify-content-end">
                <button type="button" class="btn btn-outline-secondary">Cancel</button>
                <button type="button" class="btn btn-primary" (click)="saveMiscData()">Save</button>
              </div>
            </div>

            <!---Misc Start List-->
            <div class="row gx-4">
              <div class="col-sm-12">
                <div class="card">
                  <div class="card-header d-flex align-items-center justify-content-between">
                    <h5 class="card-title">List</h5>
                  </div>
                  <div class="card-body">
                    <!-- Table starts -->
                    <div class="table-responsive">
                      <table id="basicExample" class="table m-0 align-middle">
                        <thead>
                          <tr>
                            <!-- <th>#</th> -->
                            <th>Type</th>
                            <th>Value</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr *ngFor="let singlePackage of miscData">
                            <!-- <td>001</td> -->
                            <td>
                              <!-- <img
                              src="assets/images/user.png"
                              class="img-shadow img-2x rounded-5 me-1"
                              alt="Fitness Dashboard"
                            /> -->
                              {{ type }}
                            </td>
                            <td>{{ singlePackage.key }}</td>
                            <td>
                              <div class="d-inline-flex gap-1">
                                <button
                                  class="btn btn-outline-danger btn-sm"
                                  (click)="deleteMisc(singlePackage)"
                                >
                                  <i class="ri-delete-bin-line"></i>
                                </button>
                              </div>
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                    <!-- Table ends -->

                    <!-- Modal Delete Row -->

                    <dialog #delModal>
                      <div class="modal-header">
                        <h5>Confirm Delete</h5>
                        <button class="btn-close-x" (click)="closeModal()">&times;</button>
                      </div>
                      
                      <div class="modal-body">
                        Are you sure you want to delete this misc data? <br>
                        <small style="color: #999;">This action cannot be undone.</small>
                      </div>
                      
                      <div class="modal-footer">
                        <button class="btn-no" (click)="closeModal()">Cancel</button>
                        <button class="btn-yes" (click)="confirmDelete()">Delete</button>
                      </div>
                    </dialog>
                  </div>
                </div>
              </div>
            </div>
            <!---Misc End List-->
          </div>
          <!-- Row ends -->
        </div>
      </div>
    </div>
  </div>
  <!-- Row ends -->
</div>
<!-- App body ends -->
